<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 圓桌</title>
<style>
  :root {
    --bg: #101418; --panel: #181f26; --line: #2a3540;
    --text: #dfe7ee; --dim: #8fa0af; --me: #2b3d52;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.65 "Microsoft JhengHei", "Segoe UI", sans-serif;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  header h1 { font-size: 15px; margin: 0 4px 0 0; letter-spacing: 1px; flex: 0 0 auto; }
  #sessionTitle {
    flex: 0 1 280px; min-width: 90px; max-width: 280px;
    border: 1px solid var(--line); border-radius: 14px; color: var(--text);
    background: rgba(255,255,255,.03); padding: 3px 10px; cursor: pointer;
    font-size: 13px; line-height: 1.5; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
  }
  #sessionTitle:hover { border-color: #4c8bf5; }
  .title-input {
    flex: 0 1 280px; min-width: 120px; max-width: 280px;
    background: var(--bg); color: var(--text); border: 1px solid #4c8bf5;
    border-radius: 8px; font: inherit; font-size: 13px; padding: 3px 8px;
  }
  .title-input:focus { outline: none; }
  #chips { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .chip {
    border: 1px solid var(--line); border-radius: 16px; padding: 4px 12px;
    cursor: pointer; user-select: none; color: var(--dim); background: transparent;
    font-size: 13px; transition: all .15s;
  }
  .chip.on { color: #fff; border-color: currentColor; }
  .chip .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 6px; background: currentColor; opacity: .4; }
  .chip.on .dot { opacity: 1; }
  .chip.busy .dot { animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .15; } }
  .seat { display: inline-flex; align-items: center; gap: 4px; }
  .mselect {
    background: var(--bg); color: var(--dim); border: 1px solid var(--line);
    border-radius: 8px; font-size: 12px; padding: 3px 4px; max-width: 190px;
  }
  .mselect:focus { outline: none; border-color: #4c8bf5; }
  #inviteBtn { margin-left: auto; }
  #inviteBtn, #newBtn, #fullOutputBtn { background: none; border: 1px solid var(--line);
    color: var(--dim); border-radius: 8px; padding: 4px 10px; cursor: pointer; }
  #inviteBtn:hover, #newBtn:hover, #fullOutputBtn:hover { color: var(--text); }
  #inviteBtn:disabled, #newBtn:disabled { opacity: .45; cursor: default; }
  #fullOutputBtn.on { color: #fff; border-color: #4c8bf5; }
  .bubble.skip-only { color: var(--dim); font-style: italic; }
  main { flex: 1; overflow-y: auto; padding: 18px 0 8px; }
  .row { max-width: 860px; margin: 0 auto 14px; padding: 0 16px; display: flex; }
  .bubble {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 10px 14px; max-width: 88%; white-space: pre-wrap; word-break: break-word;
  }
  .row.me { justify-content: flex-end; }
  .row.me .bubble { background: var(--me); border-color: #3c5677; }
  .who { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
  .who .msgno { font-weight: normal; color: var(--dim); margin-right: 6px; }
  .who .sub { font-weight: normal; color: var(--dim); margin-left: 6px; font-size: 11px; }
  .who .ts { font-weight: normal; color: var(--dim); margin-left: 8px; font-size: 11px; }
  .row.sys .bubble { border-style: dashed; color: var(--dim); font-size: 13px; }
  .typing { color: var(--dim); font-size: 13px; font-style: italic; }
  .typing-bubble { display: inline-flex; align-items: center; gap: 10px; }
  .cancelBtn {
    background: transparent; border: 1px solid #6d3f45; color: #e6a0a7;
    border-radius: 8px; padding: 2px 8px; cursor: pointer; font: inherit;
    font-size: 12px; font-style: normal; line-height: 1.5;
  }
  .cancelBtn:hover { border-color: #e6a0a7; color: #fff; }
  .cancelBtn:disabled { opacity: .45; cursor: default; }
  footer { background: var(--panel); border-top: 1px solid var(--line); padding: 12px 16px; }
  .composer { max-width: 860px; margin: 0 auto; display: flex; gap: 10px; }
  textarea {
    flex: 1; resize: none; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px;
    font: inherit; min-height: 44px; max-height: 160px;
  }
  textarea:focus { outline: none; border-color: #4c8bf5; }
  #sendBtn {
    background: #2f6fda; color: #fff; border: none; border-radius: 10px;
    padding: 0 22px; font: inherit; cursor: pointer;
  }
  #sendBtn:disabled { opacity: .45; cursor: default; }
  .hint { max-width: 860px; margin: 6px auto 0; color: var(--dim); font-size: 12px; }
  .hint .opt { margin-right: 10px; color: var(--text); cursor: pointer; }
  .hint .opt input[type=number] {
    width: 46px; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 6px; padding: 1px 4px; font: inherit; font-size: 12px;
  }
  .discuss-bar {
    max-width: 860px; margin: 0 auto 10px; padding: 6px 12px; font-size: 13px;
    border: 1px solid #3c5677; border-radius: 8px; background: rgba(47,111,218,.12); color: var(--text);
  }
  #authGate {
    position: fixed; inset: 0; z-index: 20; background: rgba(16,20,24,.96);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  #authGate.show { display: flex; }
  .auth-box {
    width: min(420px, 100%); border: 1px solid var(--line); border-radius: 10px;
    background: var(--panel); padding: 18px; box-shadow: 0 20px 60px rgba(0,0,0,.35);
  }
  .auth-box h2 { margin: 0 0 12px; font-size: 16px; }
  .auth-box input {
    width: 100%; margin: 6px 0; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font: inherit;
  }
  .auth-box button {
    width: 100%; margin-top: 8px; background: #2f6fda; color: #fff; border: none;
    border-radius: 8px; padding: 8px 10px; font: inherit; cursor: pointer;
  }
  .auth-msg { min-height: 20px; color: #e6a0a7; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<header>
  <h1>AI 圓桌</h1>
  <span id="sessionTitle" title="點擊修改會議名稱">未命名會議</span>
  <span id="chips"></span>
  <button id="inviteBtn" title="產生 3 分鐘有效的一次性邀請碼" style="display:none">邀請</button>
  <button id="fullOutputBtn" title="切換是否顯示 AI 完整輸出（含非回覆內容）">顯示完整輸出</button>
  <button id="newBtn" title="歸檔目前逐字稿並開新會議">🧹 新會議</button>
</header>
<div id="authGate">
  <div class="auth-box">
    <h2>加入 AI 圓桌</h2>
    <input id="authName" maxlength="40" placeholder="你的暱稱">
    <input id="authToken" placeholder="邀請碼">
    <button id="authBtn" type="button">加入</button>
    <div id="authMsg" class="auth-msg"></div>
  </div>
</div>
<main id="log"></main>
<footer>
  <div id="discussBar" class="discuss-bar" style="display:none"></div>
  <div class="composer">
    <textarea id="input" placeholder="輸入發言…（Enter 送出，Shift+Enter 換行）"></textarea>
    <button id="sendBtn">送出</button>
  </div>
  <div class="hint">
    <label class="opt"><input type="checkbox" id="consensusMode"> 共識討論模式</label>
    <span id="roundsWrap" class="opt" style="display:none">最多 <input type="number" id="maxRounds" min="2" max="8" value="3"> 輪</span>
    <span id="hintText">送出後會自動徵詢所有<b>已啟用</b>的參與者；點上方名字可把 AI 拉進 / 移出圓桌。</span>
  </div>
</footer>
<script>
const state = { total: 0, participants: {}, enabled: {}, busy: [], sessionTitle: '未命名會議', session: null };
let enableInflight = 0; // >0 時暫停用伺服器值覆蓋本地樂觀切換
const $ = id => document.getElementById(id);
let editingTitle = false;
let showFullOutput = localStorage.getItem('ai_roundtable_show_full') === '1';

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const MARK_RE = /^\s*(\*\*)?(Reply|Skip)\s+\S.*?\[\d+\](\*\*)?\s*[:：]/;

// 從 AI 全文中只抽出 Reply 段落；沒有任何 Reply/Skip 標記時回傳原文（共識討論等自由格式）。
// 只有 Skip、沒有 Reply 時回傳空字串，呼叫端顯示佔位文字。
function extractReplies(text) {
  const src = String(text || '');
  const lines = src.split('\n');
  const marks = [];
  lines.forEach((line, i) => {
    const mm = line.match(MARK_RE);
    if (mm) marks.push({ i, type: mm[2] });
  });
  if (marks.length === 0) return src;

  const isHr = line => /^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(line);
  const isHeading = line => /^\s*#/.test(line);

  const segments = [];
  for (let k = 0; k < marks.length; k++) {
    if (marks[k].type !== 'Reply') continue;
    const start = marks[k].i;
    let end = lines.length;
    for (let j = start + 1; j < lines.length; j++) {
      if (marks.some(mk => mk.i === j)) { end = j; break; }
      if (isHr(lines[j]) || isHeading(lines[j])) { end = j; break; }
    }
    segments.push(lines.slice(start, end).join('\n').trim());
  }
  return segments.join('\n\n').trim();
}

function isHost() {
  return state.session && state.session.role === 'host';
}

function setAuthVisible(visible) {
  $('authGate').className = visible ? 'show' : '';
}

function updateRoleUi() {
  const host = isHost();
  $('inviteBtn').style.display = host ? '' : 'none';
  $('newBtn').disabled = !host;
  $('sessionTitle').style.cursor = host ? 'pointer' : 'default';
  $('hintText').innerHTML = host
    ? '送出後會自動徵詢所有<b>已啟用</b>的參與者；點上方名字可把 AI 拉進 / 移出圓桌。'
    : 'Guest 發言會寫入逐字稿並自動徵詢目前已啟用的 AI 席位；模型切換、席位增減與會議控制由 HOST 操作。';
  $('consensusMode').disabled = !host;
  if (!host) $('consensusMode').checked = false;
  $('roundsWrap').style.display = host && $('consensusMode').checked ? '' : 'none';
  updateChips();
}

async function verifyInvite() {
  const name = $('authName').value.trim();
  const token = $('authToken').value.trim();
  $('authMsg').textContent = '';
  if (!name || !token) {
    $('authMsg').textContent = '請輸入暱稱與邀請碼';
    return;
  }
  const r = await fetch('/api/token/verify', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, token })
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) {
    $('authMsg').textContent = j.error || '邀請碼無效或已過期';
    return;
  }
  state.session = j.session;
  setAuthVisible(false);
  await poll();
}

function applyInviteFromUrl() {
  const params = new URLSearchParams(location.search);
  const invite = params.get('invite');
  if (invite) {
    $('authToken').value = invite;
    history.replaceState(null, '', location.pathname);
  }
}

async function generateInvite() {
  const role = confirm('按「確定」產生 HOST 邀請碼；按「取消」產生 GUEST 邀請碼。') ? 'host' : 'guest';
  if (role === 'host' && !confirm('HOST 可以改模型、開新會議、取消 AI 呼叫。確定要產生 HOST 碼？')) return;
  const r = await fetch('/api/token/generate', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ role })
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) {
    alert(j.error || '邀請碼產生失敗');
    return;
  }
  const msg = `${j.role.toUpperCase()} 邀請碼，${j.expires_in} 秒內有效，一次性使用：\n\n${j.token}\n\n連結：\n${j.url}`;
  try {
    await navigator.clipboard.writeText(j.url);
    alert(`${msg}\n\n已複製連結。`);
  } catch (e) {
    prompt('複製邀請連結', j.url);
  }
}

function renderSessionTitle() {
  if (editingTitle) return;
  const el = $('sessionTitle');
  el.textContent = state.sessionTitle || '未命名會議';
  el.title = `點擊修改會議名稱\n${state.sessionTitle || '未命名會議'}`;
}

function startTitleEdit() {
  if (editingTitle || !isHost()) return;
  editingTitle = true;
  const current = state.sessionTitle || '未命名會議';
  const el = $('sessionTitle');
  const input = document.createElement('input');
  input.className = 'title-input';
  input.value = current;
  input.setAttribute('aria-label', '會議名稱');
  el.replaceWith(input);
  input.focus();
  input.select();

  let finished = false;
  const finish = async save => {
    if (finished) return;
    finished = true;
    editingTitle = false;
    const span = document.createElement('span');
    span.id = 'sessionTitle';
    span.title = '點擊修改會議名稱';
    span.onclick = startTitleEdit;
    input.replaceWith(span);
    if (save) await saveTitle(input.value);
    renderSessionTitle();
  };

  input.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); finish(true); }
    if (e.key === 'Escape') { e.preventDefault(); finish(false); }
  };
  input.onblur = () => finish(true);
}

async function saveTitle(value) {
  const title = (value || '').trim() || '未命名會議';
  state.sessionTitle = title;
  const r = await fetch('/api/title', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title })
  });
  if (r.ok) {
    const j = await r.json();
    state.sessionTitle = j.title || title;
  } else {
    alert('會議名稱儲存失敗，請重試');
  }
}

$('sessionTitle').onclick = startTitleEdit;
$('authBtn').onclick = verifyInvite;
$('inviteBtn').onclick = generateInvite;

const seats = {}; // name -> { chip, sel }；只建一次，之後原地更新，避免輪詢重建把展開中的選單關掉

function buildChips() {
  const el = $('chips');
  el.innerHTML = '';
  for (const [name, p] of Object.entries(state.participants)) {
    const seat = document.createElement('span');
    seat.className = 'seat';
    const c = document.createElement('span');
    c.innerHTML = `<span class="dot"></span>${esc(p.display)}`;
    c.title = '點擊拉進 / 移出圓桌';
    c.onclick = async () => {
      if (!isHost()) return;
      const on = !state.enabled[name];
      state.enabled[name] = on; // 樂觀更新
      updateChips();
      enableInflight++;
      try {
        const r = await fetch('/api/enabled', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, on })
        });
        if (!r.ok) { state.enabled[name] = !on; updateChips(); }
      } catch (e) { state.enabled[name] = !on; updateChips(); }
      finally { enableInflight--; }
    };
    seat.appendChild(c);
    const sel = document.createElement('select');
    sel.className = 'mselect';
    sel.title = '選擇這個席位使用的模型';
    for (const m of p.models) {
      const o = document.createElement('option');
      o.value = m; o.textContent = m;
      sel.appendChild(o);
    }
    sel.value = p.selected;
    sel.onchange = async () => {
      if (!isHost()) return;
      const label = sel.value;
      state.participants[name].selected = label; // 樂觀更新，防止下一輪 poll 蓋回舊值
      const r = await fetch('/api/config', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, label })
      });
      if (!r.ok) alert('模型切換失敗，請重試');
    };
    seat.appendChild(sel);
    el.appendChild(seat);
    seats[name] = { chip: c, sel };
  }
  updateChips();
}

function updateChips() {
  for (const [name, p] of Object.entries(state.participants)) {
    const s = seats[name];
    if (!s) continue;
    s.chip.className = 'chip' + (state.enabled[name] ? ' on' : '') + (state.busy.includes(name) ? ' busy' : '');
    s.chip.style.color = state.enabled[name] ? p.color : '';
    s.chip.style.cursor = isHost() ? 'pointer' : 'default';
    s.sel.disabled = !isHost();
    // 使用者正在操作的選單絕不去動；其餘情況才同步伺服器端的選擇
    if (document.activeElement !== s.sel && s.sel.value !== p.selected) s.sel.value = p.selected;
  }
}

function messageRole(m) {
  if (['host', 'guest', 'ai', 'system'].includes(m.role)) return m.role;
  if (m.speaker === '你') return 'host';
  if (m.speaker === 'system') return 'system';
  if (state.participants[m.speaker]) return 'ai';
  return 'guest';
}

function messageName(m) {
  if (m.name) return m.name;
  const p = state.participants[m.speaker];
  if (p) return p.display;
  return m.speaker || 'unknown';
}

function addBubble(m, number) {
  const p = state.participants[m.speaker];
  const role = messageRole(m);
  const row = document.createElement('div');
  const isMe = role === 'host' || role === 'guest';
  row.className = 'row' + (isMe ? ' me' : '') + (role === 'system' ? ' sys' : '');
  const color = p ? p.color : (isMe ? '#9fc1ea' : '#8fa0af');
  const label = messageName(m);
  const sub = m.sub ? `<span class="sub">${esc(m.sub)}</span>` : '';
  let bodyText = m.text;
  let skipOnly = false;
  if (role === 'ai' && !showFullOutput) {
    bodyText = extractReplies(m.text);
    if (!bodyText) { bodyText = '（本則無回覆內容）'; skipOnly = true; }
  }
  row.innerHTML = `<div class="bubble${skipOnly ? ' skip-only' : ''}"><div class="who" style="color:${color}"><span class="msgno">[${number}]</span>${esc(label)}${sub}<span class="ts">${esc(m.ts || '')}</span></div>${esc(bodyText)}</div>`;
  $('log').appendChild(row);
}

function renderTyping() {
  document.querySelectorAll('.row.typing').forEach(e => e.remove());
  for (const name of state.busy) {
    const p = state.participants[name];
    const d = document.createElement('div');
    d.className = 'row typing';
    d.innerHTML = `<div class="bubble typing-bubble"><span>${esc(p ? p.display : name)} 思考中…</span><button class="cancelBtn" type="button" title="取消本次呼叫">取消</button></div>`;
    d.querySelector('.cancelBtn').onclick = e => cancelCall(name, e.currentTarget);
    $('log').appendChild(d);
  }
}

async function cancelCall(name, button) {
  if (button) button.disabled = true;
  await fetch('/api/cancel', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  await poll();
}

async function poll() {
  try {
    const r = await fetch(`/api/state?since=${state.total}`);
    if (r.status === 401) { setAuthVisible(true); return; }
    const j = await r.json();
    state.session = j.session || state.session;
    setAuthVisible(false);
    state.participants = j.participants;
    state.sessionTitle = j.session_title || '未命名會議';
    updateRoleUi();
    renderSessionTitle();
    renderDiscussBar(j.discussion);
    if (enableInflight === 0) {
      // enabled seats 以伺服器為準（持久化、有預設值）
      state.enabled = {};
      for (const n of (j.enabled_seats || [])) state.enabled[n] = true;
    }
    const nearBottom = $('log').scrollHeight - $('log').scrollTop - $('log').clientHeight < 80;
    if (j.total < state.total) { $('log').innerHTML = ''; state.total = 0; return poll(); }
    const base = state.total;
    j.messages.forEach((m, i) => addBubble(m, base + i + 1));
    state.total = j.total;
    state.busy = j.busy;
    if (Object.keys(seats).length === 0) buildChips(); else updateChips();
    renderTyping();
    if ((j.messages.length || j.busy.length) && nearBottom) $('log').scrollTop = $('log').scrollHeight;
  } catch (e) { /* server 未起或暫時斷線，下一輪再試 */ }
}

async function send() {
  const text = $('input').value.trim();
  if (!text) return;
  const ask = isHost() ? Object.entries(state.enabled).filter(([, v]) => v).map(([k]) => k) : [];
  const body = { text, ask };
  if (isHost() && $('consensusMode').checked) {
    body.mode = 'discussion';
    body.max_rounds = Math.max(2, Math.min(8, parseInt($('maxRounds').value, 10) || 3));
  }
  $('sendBtn').disabled = true;
  try {
    await fetch('/api/send', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    $('input').value = '';
    await poll();
  } finally { $('sendBtn').disabled = false; $('input').focus(); }
}

$('consensusMode').onchange = () => {
  $('roundsWrap').style.display = isHost() && $('consensusMode').checked ? '' : 'none';
};

function renderDiscussBar(d) {
  const bar = $('discussBar');
  if (d && d.active) {
    bar.style.display = '';
    const stage = d.round <= 1 ? '第 1 輪 · 各席獨立表態中' : `第 ${d.round}/${d.max_rounds} 輪`;
    bar.textContent = `🗣 共識討論進行中 · ${stage}（送出任何發言即可插話中止）`;
  } else {
    bar.style.display = 'none';
  }
}

$('sendBtn').onclick = send;
$('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
$('newBtn').onclick = async () => {
  if (!confirm('歸檔目前逐字稿並開新會議？')) return;
  const r = await fetch('/api/new', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
  if (r.ok) {
    const j = await r.json();
    state.sessionTitle = j.session_title || '未命名會議';
  }
  $('log').innerHTML = ''; state.total = 0;
  renderSessionTitle();
};

function renderFullOutputBtn() {
  $('fullOutputBtn').className = showFullOutput ? 'on' : '';
}
$('fullOutputBtn').onclick = () => {
  showFullOutput = !showFullOutput;
  localStorage.setItem('ai_roundtable_show_full', showFullOutput ? '1' : '0');
  renderFullOutputBtn();
  $('log').innerHTML = ''; state.total = 0; poll();
};
renderFullOutputBtn();

applyInviteFromUrl();
poll();
setInterval(poll, 1500);
</script>
</body>
</html>
